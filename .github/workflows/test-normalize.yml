name: test-normalize

# Manual end-to-end test of the normalize step: scrape both sources live on a
# runner, then unify + derive alpha, and upload the combined output. Validation
# only — commits no data.

on:
  workflow_dispatch:
    inputs:
      limit:
        description: 'Per-source cap (0 = all: ~1,201 PMS + ~162 AIF)'
        required: false
        default: '0'

permissions:
  contents: read

jobs:
  test-normalize:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install scraper deps (--no-save)
        run: npm install playwright@1 cheerio@1 --no-save

      - name: Install Playwright chromium (+ system deps)
        run: npx playwright install --with-deps chromium

      - name: Scrape APMI (PMS)
        env:
          LIMIT: ${{ inputs.limit }}
        run: node perf-scraper/scrape-apmi.mjs

      - name: Scrape PMS Bazaar (AIF)
        env:
          LIMIT: ${{ inputs.limit }}
          PMSBAZAAR_EMAIL: ${{ secrets.PMSBAZAAR_EMAIL }}
          PMSBAZAAR_PASSWORD: ${{ secrets.PMSBAZAAR_PASSWORD }}
        run: node perf-scraper/scrape-pmsbazaar.mjs

      - name: Normalize & unify (+ derive alpha)
        run: node perf-scraper/normalize.mjs

      - name: Build rolling store (placeholder → real, ephemeral in CI)
        run: node perf-scraper/build-store.mjs

      - name: Write monthly snapshot + index
        run: node perf-scraper/write-snapshot.mjs

      - name: Upload output (raw + funds-normalized + store + snapshots)
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: pipeline-output
          path: |
            perf-scraper/output/
            public/data/funds-performance.json
            public/data/metadata.json
            public/data/snapshots/
          if-no-files-found: warn
