name: test-pipeline

# Manual end-to-end test of the monthly orchestrator: run-pipeline.mjs drives
# scrape-apmi → scrape-pmsbazaar → normalize → build-store → write-snapshot, then
# uploads public/data/ (store + snapshots) for inspection. Validation only —
# commits no data (the first real commit is step 8's scheduled workflow).

on:
  workflow_dispatch:
    inputs:
      limit:
        description: 'Per-source cap (0 = all: ~1,201 PMS + ~162 AIF)'
        required: false
        default: '0'

permissions:
  contents: read

jobs:
  test-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install scraper deps (--no-save)
        run: npm install playwright@1 cheerio@1 --no-save

      - name: Install Playwright chromium (+ system deps)
        run: npx playwright install --with-deps chromium

      - name: Run pipeline (orchestrator)
        env:
          LIMIT: ${{ inputs.limit }}
          PMSBAZAAR_EMAIL: ${{ secrets.PMSBAZAAR_EMAIL }}
          PMSBAZAAR_PASSWORD: ${{ secrets.PMSBAZAAR_PASSWORD }}
        run: node perf-scraper/run-pipeline.mjs

      - name: Upload output (store + snapshots + raw/normalized)
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: pipeline-output
          path: |
            public/data/
            perf-scraper/output/
          if-no-files-found: warn
